{% extends "ledger/base.html" %}

{% block title %}Recipes{% endblock %}

{% block page_heading %}All Recipes{% endblock %}

{% block content %}
<ul>
    {% for recipe in recipes %}
        <li>
            <h3>{{ recipe.name }}</h3>
            <p>by {{ recipe.author.name }}</p>
            <a href="{% url 'ledger:recipe-detail' recipe.pk %}">View Recipe</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
